<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Interactivo</title>
    <style>
        :root { 
            --bg-pastel: #ffe5ec; /* Fondo Rosa Pastel */
            --grid-border: #ffb3c1; 
            --cell-bg: #ffffff;
            --accent: #fb6f92;
            --success-green: #22c55e; /* Verde brillante para las correctas */
            --text-color: #594157;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-pastel); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }

        /* Estructura de 3 columnas para PC */
        .main-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Espacios laterales para imágenes */
        .side-image {
            flex: 1;
            max-width: 250px;
        }

        .side-image img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Contenedor central del crucigrama */
        .center-content {
            flex: 2;
            background: rgba(255, 255, 255, 0.6); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 100%;
            overflow-x: auto;
        }

        h1 { color: var(--accent); margin-top: 0; }

        /* Cuadrícula ampliada para que quepa "Taller de investigación" */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(23, 28px); 
            grid-template-rows: repeat(23, 28px); 
            gap: 2px; 
            background-color: var(--grid-border); 
            padding: 5px;
            border-radius: 8px;
            margin: auto;
            width: fit-content;
        }

        .cell {
            width: 28px; height: 28px; 
            background: var(--cell-bg);
            border: 1px solid #fce1e4; 
            text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 15px; 
            color: var(--text-color); outline: none;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* EL COLOR VERDE PARA LAS RESPUESTAS CORRECTAS */
        .cell.correct { 
            background-color: var(--success-green) !important; 
            color: #ffffff !important; 
            border-color: #166534 !important; 
            transform: scale(1.05);
        }
        
        .cell:focus { background: #ffc2d1; }
        .black { background: transparent !important; border: none !important; }

        /* Caja de Recompensa (Imagen + Texto) */
        #reward-box {
            margin-top: 25px; 
            padding: 20px; 
            border: 3px dashed var(--accent);
            background: #fff; 
            border-radius: 15px;
            display: none; /* Oculto hasta tener 3 palabras */
            animation: popIn 0.5s ease-out;
        }

        #reward-box img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        #reward-box textarea {
            width: 90%;
            height: 60px;
            padding: 10px;
            border: 2px solid var(--grid-border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Adaptación para celulares */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .side-image { max-width: 100%; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400" alt="Decoración Izquierda">
        </div>

        <div class="center-content">
            <h1>✨ Crucigrama</h1>
            <p>Palabras completadas: <span id="count">0</span> / 12</p>

            <div id="crossword" class="grid"></div>

            <div id="reward-box">
                <h3 style="color: var(--accent); margin-top: 0;">🎁 ¡Desbloqueaste un recuerdo!</h3>
                <img src="https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=600" alt="Premio">
                <textarea placeholder="Escribe aquí tu mensaje, código o dedicatoria..."></textarea>
            </div>
        </div>

        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1581022295087-35e593704911?q=80&w=400" alt="Decoración Derecha">
        </div>

    </div>

<script>
    // Palabras programadas para que se crucen perfectamente
    const wordData = [
        { x: 2, y: 2, d: 'v', w: "PAICAVI" },
        { x: 2, y: 2, d: 'h', w: "PEPA" },
        { x: 0, y: 6, d: 'h', w: "PLAYABLANCA" }, 
        { x: 2, y: 8, d: 'h', w: "ISIDORACOUSINHO" },
        { x: 10, y: 5, d: 'v', w: "MARGARITA" }, 
        { x: 5, y: 11, d: 'h', w: "CABEZONA" },
        { x: 5, y: 11, d: 'v', w: "MONA" }, 
        { x: 1, y: 14, d: 'h', w: "TALLERDEINVESTIGACION" },
        { x: 17, y: 10, d: 'v', w: "AOHARURIDE" },
        { x: 2, y: 17, d: 'h', w: "MORTALKOMBATX" },
        { x: 19, y: 2, d: 'v', w: "ENRIQUEMOLINA" },
        { x: 21, y: 10, d: 'v', w: "REDFILM" }
    ];

    const gridContainer = document.getElementById('crossword');
    const cellMap = {};

    // 1. Crear fondo (23x23)
    for (let y = 0; y < 23; y++) {
        for (let x = 0; x < 23; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell black';
            gridContainer.appendChild(empty);
            cellMap[`${x}-${y}`] = empty;
        }
    }

    // 2. Colocar casillas para escribir
    wordData.forEach(wordObj => {
        for (let i = 0; i < wordObj.w.length; i++) {
            const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
            const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
            
            if (cellMap[`${cx}-${cy}`].tagName !== 'INPUT') {
                const input = document.createElement('input');
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.letter = wordObj.w[i];
                gridContainer.replaceChild(input, cellMap[`${cx}-${cy}`]);
                cellMap[`${cx}-${cy}`] = input;
                input.addEventListener('input', checkProgress);
            }
        }
    });

    function checkProgress() {
        let totalCompleted = 0;

        wordData.forEach(wordObj => {
            let isWordCorrect = true;
            for (let i = 0; i < wordObj.w.length; i++) {
                const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
                const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
                const cell = cellMap[`${cx}-${cy}`];

                if (cell.value.toUpperCase() !== wordObj.w[i]) {
                    isWordCorrect = false;
                    cell.classList.remove('correct');
                } else {
                    cell.classList.add('correct');
                }
            }
            if (isWordCorrect) totalCompleted++;
        });

        document.getElementById('count').innerText = totalCompleted;

        // Mostrar la caja de imagen interactiva al lograr 3 palabras
        if (totalCompleted >= 3) {
            document.getElementById('reward-box').style.display = 'block';
        }
    }
</script>
</body>
</html>
