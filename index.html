<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama con Premios</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 40px); gap: 5px; justify-content: center; margin-top: 20px; }
        input { width: 40px; height: 40px; text-align: center; text-transform: uppercase; font-weight: bold; border: 2px solid #ccc; font-size: 20px; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        #ticket { margin-top: 30px; padding: 20px; background: #fff3cd; border: 2px dashed #ffc107; border-radius: 10px; display: inline-block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>🧩 Crucigrama de Premios</h1>
    <p>Palabras completadas: <span id="count">0</span>/1</p>
    <p><small>(Escribe "SOL" para probar el primer ticket)</small></p>

    <div class="grid">
        <input type="text" maxlength="1" data-word="word1" data-letter="S">
        <input type="text" maxlength="1" data-word="word1" data-letter="O">
        <input type="text" maxlength="1" data-word="word1" data-letter="L">
    </div>

    <div id="reward-area">
        <div id="ticket" class="hidden">
            <h3>¡Felicidades! 🎟️</h3>
            <p>Has desbloqueado un cupón: <strong>CANJE-EXITO-2026</strong></p>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input');
        const ticket = document.getElementById('ticket');
        const countDisplay = document.getElementById('count');
        let completedWords = new Set();

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const wordId = input.getAttribute('data-word');
                const sameWordInputs = document.querySelectorAll(`input[data-word="${wordId}"]`);
                
                let isFull = true;
                let currentWord = "";
                
                sameWordInputs.forEach(i => {
                    currentWord += i.value.toUpperCase();
                    if (i.value.toUpperCase() !== i.getAttribute('data-letter')) isFull = false;
                });

                if (isFull && !completedWords.has(wordId)) {
                    completedWords.add(wordId);
                    sameWordInputs.forEach(i => {
                        i.classList.add('correct');
                        i.disabled = true;
                    });
                    updateCounter();
                }
            });
        });

        function updateCounter() {
            const count = completedWords.size;
            countDisplay.innerText = count;
            // Para esta prueba, se desbloquea con la primera palabra (SOL)
            if (count >= 1) {
                ticket.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
