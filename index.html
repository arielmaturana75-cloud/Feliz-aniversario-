<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama de Premios</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --cell: #ffffff; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .container { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(20, 25px); 
            grid-template-rows: repeat(20, 25px); 
            gap: 1px; 
            background: #334155; 
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }

        .cell {
            width: 25px; height: 25px; background: var(--cell);
            border: none; text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 14px; color: #1e293b; outline: none;
        }

        .cell.correct { background: #22c55e !important; color: white; }
        .cell:focus { background: #fbbf24; }
        .black { background: transparent !important; }

        #reward {
            margin-top: 20px; padding: 15px; border: 2px dashed #fbbf24;
            background: rgba(251, 191, 36, 0.1); border-radius: 10px;
            display: none; text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧩 Crucigrama Interactivo</h1>
        <p>Palabras completadas: <span id="count">0</span> / 13</p>

        <div id="crossword" class="grid"></div>

        <div id="reward">
            <h3 style="color:#fbbf24; margin:0;">🎟️ ¡TICKET DESBLOQUEADO!</h3>
            <p id="ticket-msg" style="margin:5px 0;"></p>
        </div>
    </div>

        { x: 1, y: 3, d: 'h', w: "PEPA" },

        { x: 15, y: 7, d: 'v', w: "AOHARURIDE" },

        { x: 3, y: 13, d: 'v', w: "MOLINA" },

    ];

    const grid = document.getElementById('crossword');
    const cellMap = {};

    for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 20; x++) {
            const div = document.createElement('div');
            div.className = 'cell black';
            grid.appendChild(div);
            cellMap[`${x}-${y}`] = div;
        }
    }

    // Colocar palabras
    wordData.forEach(data => {
        for (let i = 0; i < data.w.length; i++) {
            const cx = data.d === 'h' ? data.x + i : data.x;
            const cy = data.d === 'v' ? data.y + i : data.y;
            if (cellMap[`${cx}-${cy}`].tagName !== 'INPUT') {
                const input = document.createElement('input');
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.letter = data.w[i];
                grid.replaceChild(input, cellMap[`${cx}-${cy}`]);
                cellMap[`${cx}-${cy}`] = input;
                input.addEventListener('input', checkStatus);
            }
        }
    });
