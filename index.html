<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Especial</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; }
        .container { max-width: 900px; margin: auto; background: #ecf0f1; padding: 20px; border-radius: 15px; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(25, 25px); grid-template-rows: repeat(25, 25px); gap: 1px; justify-content: center; background: #bdc3c7; border: 2px solid #7f8c8d; margin: 20px auto; overflow: auto; }
        .cell { width: 25px; height: 25px; background: white; border: 1px solid #eee; text-align: center; text-transform: uppercase; font-size: 14px; font-weight: bold; line-height: 25px; outline: none; }
        .cell:disabled { background: #fff; color: #2ecc71; border: 1px solid #2ecc71; }
        .black { background: #2c3e50; border: none; }
        #ticket { margin-top: 20px; padding: 15px; background: #f1c40f; border: 3px dashed #d35400; border-radius: 10px; color: #d35400; font-weight: bold; }
        .hidden { display: none; }
        .stats { margin-bottom: 10px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧩 Mi Crucigrama Personalizado</h1>
    <div class="stats">Palabras: <span id="count">0</span> / 15</div>
    
    <div id="crossword" class="grid">
        </div>

    <div id="reward-area">
        <div id="ticket" class="hidden">
            🎉 ¡TICKET DESBLOQUEADO! 🎉<br>
            Código: <span id="ticket-code">PROMO-CHILE-2026</span>
        </div>
    </div>
</div>

<script>
    // Configuración de palabras y posiciones (x, y, dirección, palabra)
    const wordsConfig = [
        { x: 5, y: 2, d: 'h', w: "PEPA" },
        { x: 5, y: 2, d: 'v', w: "PAICAVI" },
        { x: 2, y: 5, d: 'h', w: "PARQUEISIDORA" },
        { x: 8, y: 5, d: 'v', w: "ISIDORA" }, // Parte de la anterior
        { x: 10, y: 2, d: 'v', w: "COUSINHO" },
        { x: 1, y: 10, d: 'h', w: "PLAYABLANCA" },
        { x: 12, y: 8, d: 'v', w: "MARGARITA" },
        { x: 4, y: 12, d: 'h', w: "CABEZONA" },
        { x: 4, y: 12, d: 'v', w: "MONA" },
        { x: 0, y: 15, d: 'h', w: "TALLERDEINVESTIGACION" },
        { x: 15, y: 10, d: 'v', w: "AOHARURIDE" },
        { x: 5, y: 18, d: 'h', w: "MORTALKOMBATX" },
        { x: 5, y: 18, d: 'v', w: "MOLINA" },
        { x: 10, y: 15, d: 'v', w: "LICEOENRIQUE" },
        { x: 18, y: 5, d: 'v', w: "FILM" },
        { x: 20, y: 10, d: 'h', w: "ONEPIECERED" }
    ];

    const gridEl = document.getElementById('crossword');
    const cells = {};

    // Crear cuadricula negra
    for(let y=0; y<25; y++) {
        for(let x=0; x<25; x++) {
            const el = document.createElement('input');
            el.classList.add('cell', 'black');
            el.maxLength = 1;
            el.disabled = true;
            gridEl.appendChild(el);
            cells[`${x}-${y}`] = el;
        }
    }

    // Colocar las palabras
    wordsConfig.forEach((config, idx) => {
        const word = config.w.replace(/\s/g, ''); // Quitar espacios para la lógica
        for(let i=0; i<word.length; i++) {
            const nx = config.d === 'h' ? config.x + i : config.x;
            const ny = config.d === 'v' ? config.y + i : config.y;
            const cell = cells[`${nx}-${ny}`];
            cell.classList.remove('black');
            cell.disabled = false;
            cell.setAttribute('data-ans', word[i]);
            cell.addEventListener('input', checkWords);
        }
    });

    let wordsFound = new Set();

    function checkWords() {
        wordsConfig.forEach((config, idx) => {
            const word = config.w.replace(/\s/g, '');
            let correct = true;
            for(let i=0; i<word.length; i++) {
                const nx = config.d === 'h' ? config.x + i : config.x;
                const ny = config.d === 'v' ? config.y + i : config.y;
                if(cells[`${nx}-${ny}`].value.toUpperCase() !== word[i]) correct = false;
            }
            
            if(correct && !wordsFound.has(idx)) {
                wordsFound.add(idx);
                // Bloquear celdas de la palabra
                for(let i=0; i<word.length; i++) {
                    const nx = config.d === 'h' ? config.x + i : config.x;
                    const ny = config.d === 'v' ? config.y + i : config.y;
                    cells[`${nx}-${ny}`].disabled = true;
                }
                updateUI();
            }
        });
    }

    function updateUI() {
        const count = wordsFound.size;
        document.getElementById('count').innerText = count;
        if(count > 0 && count % 3 === 0) {
            document.getElementById('ticket').classList.remove('hidden');
            // Cambiar el código del ticket cada 3 palabras si quieres
            document.getElementById('ticket-code').innerText = "TICKET-NIVEL-" + (count/3);
        }
    }
</script>
</body>
</html>
