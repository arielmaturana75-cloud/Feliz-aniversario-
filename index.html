<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Crucigrama Pastel</title>
    <style>
        :root { 
            --bg-pastel: #ffe5ec; /* Rosa Pastel */
            --grid-border: #ffb3c1; 
            --cell-bg: #ffffff;
            --accent: #fb6f92; /* Rosa Intenso */
            --correct: #72efdd; /* Turquesa para el éxito */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-pastel); 
            color: #594157; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }

        .container { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 95vw;
        }

        h1 { color: var(--accent); margin-bottom: 10px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(20, 28px); 
            grid-template-rows: repeat(20, 28px); 
            gap: 2px; 
            background-color: var(--grid-border); 
            padding: 4px;
            border-radius: 8px;
            overflow: auto;
            margin: auto;
        }

        .cell {
            width: 28px; height: 28px; 
            background: var(--cell-bg);
            border: 1px solid #fce1e4; 
            text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 15px; 
            color: #594157; outline: none;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .cell.correct { background: var(--correct) !important; color: #006d77; border-color: #72efdd; }
        .cell:focus { background: #ffc2d1; border-color: var(--accent); }
        .black { background: transparent !important; border: none !important; }

        #reward-box {
            margin-top: 25px; padding: 15px; 
            border: 3px dashed var(--accent);
            background: #fff; border-radius: 15px;
            display: none; text-align: center;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Crucigrama Personalizado</h1>
        <p>Palabras completadas: <span id="count">0</span> / 12</p>

        <div id="crossword" class="grid"></div>

        <div id="reward-box">
            <p style="font-size: 1.2rem; margin: 0;">💝 ¡NUEVO TICKET!</p>
            <p id="ticket-text" style="font-size: 0.9rem; margin: 5px 0;"></p>
        </div>
    </div>

<script>
    // Lista de palabras optimizada (sin repeticiones)
    const wordData = [
        { x: 3, y: 1, d: 'v', w: "PAICAVI" },
        { x: 1, y: 3, d: 'h', w: "PEPA" },
        { x: 0, y: 5, d: 'h', w: "ISIDORACOUSINHO" },
        { x: 13, y: 1, d: 'v', w: "PLAYABLANCA" },
        { x: 9, y: 3, d: 'v', w: "MARGARITA" },
        { x: 5, y: 7, d: 'h', w: "CABEZONA" },
        { x: 5, y: 7, d: 'v', w: "MONA" },
        { x: 0, y: 10, d: 'h', w: "TALLERDEINVESTIGACION" },
        { x: 16, y: 7, d: 'v', w: "AOHARURIDE" },
        { x: 4, y: 13, d: 'h', w: "MORTALKOMBATX" },
        { x: 10, y: 11, d: 'v', w: "ENRIQUEMOLINA" },
        { x: 18, y: 4, d: 'v', w: "REDFILM" }
    ];

    const gridContainer = document.getElementById('crossword');
    const cellMap = {};

    // 1. Crear fondo de la cuadrícula
    for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 20; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell black';
            gridContainer.appendChild(empty);
            cellMap[`${x}-${y}`] = empty;
        }
    }

    // 2. Colocar los inputs de las palabras
    wordData.forEach(wordObj => {
        for (let i = 0; i < wordObj.w.length; i++) {
            const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
            const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
            
            if (cellMap[`${cx}-${cy}`].tagName !== 'INPUT') {
                const input = document.createElement('input');
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.letter = wordObj.w[i];
                gridContainer.replaceChild(input, cellMap[`${cx}-${cy}`]);
                cellMap[`${cx}-${cy}`] = input;
                input.addEventListener('input', checkProgress);
            }
        }
    });

    function checkProgress() {
        let totalCompleted = 0;

        wordData.forEach(wordObj => {
            let isWordCorrect = true;
            for (let i = 0; i < wordObj.w.length; i++) {
                const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
                const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
                const cell = cellMap[`${cx}-${cy}`];

                if (cell.value.toUpperCase() !== wordObj.w[i]) {
                    isWordCorrect = false;
                    cell.classList.remove('correct');
                } else {
                    cell.classList.add('correct');
                }
            }
            if (isWordCorrect) totalCompleted++;
        });

        document.getElementById('count').innerText = totalCompleted;

        if (totalCompleted > 0 && totalCompleted % 3 === 0) {
            const rewardBox = document.getElementById('reward-box');
            rewardBox.style.display = 'block';
            document.getElementById('ticket-text').innerText = `Código: PASTEL-GIFT-${totalCompleted}`;
        }
    }
</script>
</body>
</html>
