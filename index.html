<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Interactivo</title>
    <style>
        :root { 
            --bg-pastel: #ffe5ec; 
            --grid-border: #ffb3c1; 
            --cell-bg: #ffffff;
            --accent: #fb6f92;
            --success-green: #22c55e;
            --text-color: #594157;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-pastel); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .side-image { flex: 1; max-width: 250px; }
        .side-image img { width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .center-content {
            flex: 2;
            background: rgba(255, 255, 255, 0.6); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 100%;
            overflow-x: auto;
        }

        h1 { color: var(--accent); margin-top: 0; }

        /* Cuadrícula de 25x30 para evitar que las palabras choquen mal */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(25, 25px); 
            grid-template-rows: repeat(30, 25px); 
            gap: 2px; 
            background-color: var(--grid-border); 
            padding: 5px;
            border-radius: 8px;
            margin: auto;
            width: fit-content;
        }

        .cell {
            width: 25px; height: 25px; 
            background: var(--cell-bg);
            border: 1px solid #fce1e4; 
            text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 14px; 
            color: var(--text-color); outline: none;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .cell.correct { 
            background-color: var(--success-green) !important; 
            color: #ffffff !important; 
            border-color: #166534 !important; 
        }
        
        .cell:focus { background: #ffc2d1; }
        .black { background: transparent !important; border: none !important; }

        /* Caja de Recompensa */
        #reward-box {
            margin-top: 25px; 
            padding: 20px; 
            border: 3px dashed var(--accent);
            background: #fff; 
            border-radius: 15px;
            display: none; 
            animation: popIn 0.5s ease-out;
        }

        #reward-img { max-width: 100%; border-radius: 10px; margin-bottom: 15px; }
        #reward-message { font-size: 16px; font-weight: bold; color: var(--text-color); margin: 0; white-space: pre-line; }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .side-image { max-width: 100%; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400" alt="Decoración Izquierda">
        </div>

        <div class="center-content">
            <h1>✨ Crucigrama</h1>
            <p>Palabras completadas: <span id="count">0</span> / 12</p>

            <div id="crossword" class="grid"></div>

            <div id="reward-box">
                <h3 style="color: var(--accent); margin-top: 0;">🎁 ¡Has desbloqueado un premio!</h3>
                <img id="reward-img" src="" alt="Premio">
                <p id="reward-message"></p>
            </div>
        </div>

        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1581022295087-35e593704911?q=80&w=400" alt="Decoración Derecha">
        </div>

    </div>

<script>
    // CONFIGURACIÓN DE LOS PREMIOS (Edita los textos y enlaces aquí)
    const rewards = {
        4: {
            img: "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=600",
            text: "¡Excelente inicio!\nAquí tienes tu primer código: INICIO-2026"
        },
        8: {
            img: "https://images.unsplash.com/photo-1512909006721-3d6018887383?q=80&w=600",
            text: "¡Ya casi lo logras!\nTu código de nivel medio: MITAD-GIFT"
        },
        12: {
            img: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=600",
            text: "¡Felicidades, completaste todo!\nTu recompensa máxima: VICTORIA-TOTAL"
        }
    };

    // Coordenadas calculadas estrictamente para que crucen sin errores
    const wordData = [
        { x: 5, y: 2, d: 'v', w: "PAICAVI" },
        { x: 5, y: 2, d: 'h', w: "PEPA" },           // Cruza en la P
        { x: 10, y: 5, d: 'h', w: "CABEZONA" }, 
        { x: 15, y: 4, d: 'v', w: "MONA" },          // Cruza en la O de Cabezona
        { x: 5, y: 13, d: 'h', w: "ISIDORACOUSIÑO" },// Incluye la Ñ
        { x: 5, y: 10, d: 'v', w: "ENRIQUEMOLINA" }, // Cruza en la I de Isidora
        { x: 12, y: 9, d: 'h', w: "REDFILM" },
        { x: 3, y: 18, d: 'v', w: "PLAYABLANCA" },
        { x: 7, y: 18, d: 'h', w: "MARGARITA" },
        { x: 1, y: 24, d: 'h', w: "TALLERDEINVESTIGACION" }, // Cruza en la L de Playa Blanca
        { x: 23, y: 10, d: 'v', w: "AOHARURIDE" },
        { x: 8, y: 28, d: 'h', w: "MORTALKOMBATX" }
    ];

    const gridContainer = document.getElementById('crossword');
    const cellMap = {};

    // 1. Crear fondo (25x30)
    for (let y = 0; y < 30; y++) {
        for (let x = 0; x < 25; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell black';
            gridContainer.appendChild(empty);
            cellMap[`${x}-${y}`] = empty;
        }
    }

    // 2. Colocar casillas
    wordData.forEach(wordObj => {
        for (let i = 0; i < wordObj.w.length; i++) {
            const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
            const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
            
            if (cellMap[`${cx}-${cy}`].tagName !== 'INPUT') {
                const input = document.createElement('input');
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.letter = wordObj.w[i];
                gridContainer.replaceChild(input, cellMap[`${cx}-${cy}`]);
                cellMap[`${cx}-${cy}`] = input;
                input.addEventListener('input', checkProgress);
            }
        }
    });

    let currentTier = 0;

    function checkProgress() {
        let totalCompleted = 0;

        wordData.forEach(wordObj => {
            let isWordCorrect = true;
            for (let i = 0; i < wordObj.w.length; i++) {
                const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
                const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
                const cell = cellMap[`${cx}-${cy}`];

                if (cell.value.toUpperCase() !== wordObj.w[i]) {
                    isWordCorrect = false;
                    cell.classList.remove('correct');
                } else {
                    cell.classList.add('correct');
                }
            }
            if (isWordCorrect) totalCompleted++;
        });

        document.getElementById('count').innerText = totalCompleted;

        // Mostrar premio exacto en 4, 8 y 12
        if (totalCompleted === 4 || totalCompleted === 8 || totalCompleted === 12) {
            // Solo actualiza si acabas de llegar a un nivel nuevo
            if (totalCompleted !== currentTier) {
                currentTier = totalCompleted;
                const rewardBox = document.getElementById('reward-box');
                const rewardImg = document.getElementById('reward-img');
                const rewardMsg = document.getElementById('reward-message');

                rewardImg.src = rewards[totalCompleted].img;
                rewardMsg.innerText = rewards[totalCompleted].text;
                
                rewardBox.style.display = 'block';
                
                // Reiniciar animación para que haga el efecto "Pop" cada vez que cambie
                rewardBox.style.animation = 'none';
                setTimeout(() => { rewardBox.style.animation = 'popIn 0.5s ease-out'; }, 10);
            }
        }
    }
</script>
</body>
</html>
