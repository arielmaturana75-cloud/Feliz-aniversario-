<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Interactivo</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #e94560;
            --correct: #0f3460;
            --text: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header-img { width: 100%; max-width: 600px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .container { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(22, 28px); 
            grid-template-rows: repeat(22, 28px); 
            gap: 2px; 
            background: #0f3460;
            padding: 5px;
            border-radius: 5px;
            overflow: auto;
            max-width: 90vw;
        }

        .cell {
            width: 28px; height: 28px; background: #fff; border: none;
            text-align: center; text-transform: uppercase; font-weight: bold;
            font-size: 16px; color: #333; transition: 0.3s;
        }

        .cell:focus { background: #ffd369; outline: none; }
        .cell.correct-letter { background: #4ecca3 !important; color: white; }
        .black { background: transparent !important; }

        #reward-panel {
            margin-top: 20px; padding: 20px; border: 2px solid var(--accent);
            border-radius: 15px; background: rgba(233, 69, 96, 0.1);
            display: none; animation: fadeIn 0.5s;
        }

        .reward-img { width: 150px; height: auto; margin: 10px; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1516116216624-53e697fedbea?q=80&w=1000" class="header-img" alt="Banner">

    <div class="container">
        <h1>🧩 Crucigrama de Desafíos</h1>
        <p>Palabras completadas: <span id="count">0</span> / 15</p>

        <div id="grid" class="grid"></div>

        <div id="reward-panel">
            <h3>🎁 ¡NUEVA RECOMPENSA!</h3>
            <p id="reward-text"></p>
            <img src="https://cdn-icons-png.flaticon.com/512/6941/6941697.png" class="reward-img">
        </div>
    </div>

<script>
    const words = [
        { x: 2, y: 1, d: 'h', w: "PEPA" },
        { x: 2, y: 1, d: 'v', w: "PAICAVI" },
        { x: 0, y: 4, d: 'h', w: "PARQUEISIDORA" },
        { x: 7, y: 1, d: 'v', w: "COUSINHO" },
        { x: 0, y: 8, d: 'h', w: "PLAYABLANCA" },
        { x: 10, y: 5, d: 'v', w: "MARGARITA" },
        { x: 3, y: 11, d: 'h', w: "CABEZONA" },
        { x: 3, y: 11, d: 'v', w: "MONA" },
        { x: 0, y: 14, d: 'h', w: "TALLERDEINVESTIGACION" },
        { x: 14, y: 8, d: 'v', w: "AOHARURIDE" },
        { x: 5, y: 17, d: 'h', w: "MORTALKOMBATX" },
        { x: 5, y: 17, d: 'v', w: "MOLINA" },
        { x: 11, y: 13, d: 'v', w: "LICEOENRIQUE" },
        { x: 18, y: 4, d: 'v', w: "FILM" },
        { x: 10, y: 10, d: 'h', w: "ONEPIECERED" }
    ];

    const gridContainer = document.getElementById('grid');
    const cells = {};

    // Crear la malla
    for(let y=0; y<22; y++) {
        for(let x=0; x<22; x++) {
            const input = document.createElement('input');
            input.classList.add('cell', 'black');
            input.maxLength = 1;
            input.disabled = true;
            gridContainer.appendChild(input);
            cells[`${x}-${y}`] = input;
        }
    }

    // Inicializar palabras
    words.forEach(wordObj => {
        const {x, y, d, w} = wordObj;
        for(let i=0; i<w.length; i++) {
            const cx = d === 'h' ? x + i : x;
            const cy = d === 'v' ? y + i : y;
            const cell = cells[`${cx}-${cy}`];
            cell.classList.remove('black');
            cell.disabled = false;
            cell.dataset.answer = w[i];
            cell.addEventListener('input', (e) => handleInput(e, cx, cy, d));
        }
    });

    function handleInput(e, x, y, d) {
        const val = e.target.value.toUpperCase();
        if(val === e.target.dataset.answer) {
            e.target.classList.add('correct-letter');
        } else {
            e.target.classList.remove('correct-letter');
        }
        checkProgress();
    }

    let completedCount = 0;
    function checkProgress() {
        let currentCompleted = 0;
        words.forEach(wordObj => {
            const {x, y, d, w} = wordObj;
            let isWordCorrect = true;
            for(let i=0; i<w.length; i++) {
                const cx = d === '
