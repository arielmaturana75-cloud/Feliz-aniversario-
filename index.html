<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Interconectado</title>
    <style>
        :root { 
            --bg-pastel: #ffe5ec; 
            --grid-border: #ffb3c1; 
            --cell-bg: #ffffff;
            --accent: #fb6f92;
            --success-green: #22c55e;
            --text-color: #594157;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-pastel); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .side-image { flex: 1; max-width: 250px; }
        .side-image img { width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .center-content {
            flex: 2;
            background: rgba(255, 255, 255, 0.6); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 100%;
            overflow-x: auto;
        }

        h1 { color: var(--accent); margin-top: 0; }

        /* Cuadrícula exacta para que entren las 12 palabras conectadas */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(26, 25px); 
            grid-template-rows: repeat(28, 25px); 
            gap: 1px; 
            background-color: var(--grid-border); 
            padding: 5px;
            border-radius: 8px;
            margin: auto;
            width: fit-content;
        }

        .cell {
            width: 25px; height: 25px; 
            background: var(--cell-bg);
            border: 1px solid #fce1e4; 
            text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 13px; 
            color: var(--text-color); outline: none;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .cell.correct { 
            background-color: var(--success-green) !important; 
            color: #ffffff !important; 
            border-color: #166534 !important; 
        }
        
        .cell:focus { background: #ffc2d1; transform: scale(1.1); z-index: 10; position: relative;}
        .black { background: transparent !important; border: none !important; }

        /* Caja de Recompensa Animada */
        #reward-box {
            margin-top: 25px; 
            padding: 20px; 
            border: 3px dashed var(--accent);
            background: #fff; 
            border-radius: 15px;
            display: none; 
            animation: popIn 0.5s ease-out;
        }

        #reward-img { max-width: 100%; border-radius: 10px; margin-bottom: 15px; }
        #reward-message { font-size: 16px; font-weight: bold; color: var(--text-color); margin: 0; white-space: pre-line; }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .side-image { max-width: 100%; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400" alt="Decoración Izquierda">
        </div>

        <div class="center-content">
            <h1>✨ Crucigrama de Recuerdos</h1>
            <p>Palabras completadas: <span id="count">0</span> / 12</p>

            <div id="crossword" class="grid"></div>

            <div id="reward-box">
                <h3 style="color: var(--accent); margin-top: 0;">🎁 ¡Has desbloqueado un recuerdo!</h3>
                <img id="reward-img" src="" alt="Premio">
                <p id="reward-message"></p>
            </div>
        </div>

        <div class="side-image">
            <img src="https://images.unsplash.com/photo-1581022295087-35e593704911?q=80&w=400" alt="Decoración Derecha">
        </div>

    </div>

<script>
    // --- 🛠️ EDITA TUS PREMIOS AQUÍ ---
    // Cambia los enlaces de las imágenes y los textos que aparecerán
    const rewards = {
        4: {
            img: "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=600",
            text: "¡Buen comienzo!\nSigue así para descubrir más sorpresas."
        },
        8: {
            img: "https://images.unsplash.com/photo-1512909006721-3d6018887383?q=80&w=600",
            text: "¡Ya casi lo logras!\nHas desbloqueado la segunda etapa."
        },
        12: {
            img: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=600",
            text: "¡Felicidades, completaste todo el crucigrama!\nAquí tienes tu recompensa final."
        }
    };

    // --- 🧩 COORDENADAS 100% INTERCONECTADAS ---
    const wordData = [
        { x: 3, y: 13, d: 'h', w: "TALLERDEINVESTIGACION" }, 
        { x: 4, y: 11, d: 'v', w: "PLAYABLANCA" },           // Cruza con TALLER en la A
        { x: 2, y: 16, d: 'h', w: "CABEZONA" },              // Cruza con PLAYABLANCA en la B
        { x: 7, y: 15, d: 'v', w: "MONA" },                  // Cruza con CABEZONA en la O
        { x: 7, y: 4,  d: 'v', w: "AOHARURIDE" },            // Cruza con TALLER en la E
        { x: 13, y: 8, d: 'v', w: "PAICAVI" },               // Cruza con TALLER en la V
        { x: 13, y: 8, d: 'h', w: "PEPA" },                  // Cruza con PAICAVI en la P
        { x: 18, y: 10, d: 'v', w: "MARGARITA" },            // Cruza con TALLER en la G
        { x: 20, y: 6, d: 'v', w: "ISIDORACOUSIÑO" },        // Cruza con TALLER en la C
        { x: 10, y: 13, d: 'v', w: "ENRIQUEMOLINA" },        // Cruza con TALLER en la E
        { x: 10, y: 20, d: 'h', w: "MORTALKOMBATX" },        // Cruza con ENRIQUEMOLINA en la M
        { x: 6, y: 23, d: 'h', w: "REDFILM" }                // Cruza con ENRIQUEMOLINA en la I
    ];

    const gridContainer = document.getElementById('crossword');
    const cellMap = {};

    // 1. Crear el fondo oscuro de la malla (26 columnas x 28 filas)
    for (let y = 0; y < 28; y++) {
        for (let x = 0; x < 26; x++) {
            const empty = document.createElement('div');
            empty.className = 'cell black';
            gridContainer.appendChild(empty);
            cellMap[`${x}-${y}`] = empty;
        }
    }

    // 2. Tallar las palabras en la malla
    wordData.forEach(wordObj => {
        for (let i = 0; i < wordObj.w.length; i++) {
            const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
            const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
            
            if (cellMap[`${cx}-${cy}`].tagName !== 'INPUT') {
                const input = document.createElement('input');
                input.className = 'cell';
                input.maxLength = 1;
                input.dataset.letter = wordObj.w[i];
                gridContainer.replaceChild(input, cellMap[`${cx}-${cy}`]);
                cellMap[`${cx}-${cy}`] = input;
                input.addEventListener('input', checkProgress);
            }
        }
    });

    let currentTier = 0;

    function checkProgress() {
        let totalCompleted = 0;

        wordData.forEach(wordObj => {
            let isWordCorrect = true;
            for (let i = 0; i < wordObj.w.length; i++) {
                const cx = wordObj.d === 'h' ? wordObj.x + i : wordObj.x;
                const cy = wordObj.d === 'v' ? wordObj.y + i : wordObj.y;
                const cell = cellMap[`${cx}-${cy}`];

                if (cell.value.toUpperCase() !== wordObj.w[i]) {
                    isWordCorrect = false;
                    cell.classList.remove('correct');
                } else {
                    cell.classList.add('correct');
                }
            }
            if (isWordCorrect) totalCompleted++;
        });

        document.getElementById('count').innerText = totalCompleted;

        // Mostrar premio al llegar exactamente a 4, 8 y 12 palabras
        if (totalCompleted === 4 || totalCompleted === 8 || totalCompleted === 12) {
            if (totalCompleted !== currentTier) {
                currentTier = totalCompleted;
                const rewardBox = document.getElementById('reward-box');
                const rewardImg = document.getElementById('reward-img');
                const rewardMsg = document.getElementById('reward-message');

                // Cargar imagen y texto desde la configuración inicial
                rewardImg.src = rewards[totalCompleted].img;
                rewardMsg.innerText = rewards[totalCompleted].text;
                
                rewardBox.style.display = 'block';
                
                // Reiniciar animación para que llame la atención al cambiar
                rewardBox.style.animation = 'none';
                setTimeout(() => { rewardBox.style.animation = 'popIn 0.5s ease-out'; }, 10);
            }
        }
    }
</script>
</body>
</html>
