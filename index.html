<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Crucigrama Pastel</title>
    <style>
        :root { 
            --bg-pastel: #ffe5ec; /* Rosa Pastel */
            --grid-border: #ffb3c1; 
            --cell-bg: #ffffff;
            --accent: #fb6f92; /* Rosa Intenso */
            --correct: #72efdd; /* Turquesa para el éxito */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-pastel); 
            color: #594157; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }

        .container { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 95vw;
        }

        h1 { color: var(--accent); margin-bottom: 10px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(20, 28px); 
            grid-template-rows: repeat(20, 28px); 
            gap: 2px; 
            background-color: var(--grid-border); 
            padding: 4px;
            border-radius: 8px;
            overflow: auto;
            margin: auto;
        }

        .cell {
            width: 28px; height: 28px; 
            background: var(--cell-bg);
            border: 1px solid #fce1e4; 
            text-align: center; text-transform: uppercase;
            font-weight: bold; font-size: 15px; 
            color: #594157; outline: none;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .cell.correct { background: var(--correct) !important; color: #006d77; border-color: #72efdd; }
        .cell:focus { background: #ffc2d1; border-color: var(--accent); }
        .black { background: transparent !important; border: none !important; }

        #reward-box {
            margin-top: 25px; padding: 15px; 
            border: 3px dashed var(--accent);
            background: #fff; border-radius: 15px;
            display: none; text-align: center;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

        </div>
    </div>
